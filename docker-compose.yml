services:
  api:
    build: .
    environment:
      NODE_ENV: development
      PORT: 3000
      HOST: 0.0.0.0
      LOG_LEVEL: info
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      ARIADNE_STORAGE: postgres
      DATABASE_URL: postgres://ariadne:ariadne@postgres:5432/ariadne
      ARIADNE_ALLOW_MOCK_PROVIDER: "true"
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ariadne
      POSTGRES_PASSWORD: ariadne
      POSTGRES_DB: ariadne
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
