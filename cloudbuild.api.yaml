# Ariadne Engine Cloud Run API deployment.

substitutions:
  _REGION: europe-west1
  _REPOSITORY: ariadne
  _SERVICE: ariadne-api
  _APP_URL: https://ariadne-engine.web.app
  _CORS_ORIGINS: https://ariadne-engine.web.app
  _BILLING_CURRENCY: usd

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$BUILD_ID
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$BUILD_ID

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$BUILD_ID
      - --region
      - ${_REGION}
      - --allow-unauthenticated
      - --memory
      - 1Gi
      - --cpu
      - "1"
      - --concurrency
      - "40"
      - --timeout
      - "300"
      - --max-instances
      - "20"
      - --set-env-vars
      - NODE_ENV=production,ARIADNE_STORAGE=firestore,ARIADNE_PAID_USAGE_ENABLED=true,ARIADNE_FIREBASE_AUTH_REQUIRED=true,ARIADNE_ALLOW_MOCK_PROVIDER=false,ARIADNE_ALLOW_UNSAFE_PRODUCTION=false,ARIADNE_ACTOR_MODEL=gemini-flash-lite-latest,ARIADNE_CANONIZER_MODEL=gemini-flash-lite-latest,ARIADNE_LIVE_MODEL=gemini-3.1-flash-live-preview,BILLING_CURRENCY=${_BILLING_CURRENCY},APP_URL=${_APP_URL},CORS_ORIGINS=${_CORS_ORIGINS}
      - --set-secrets
      - GEMINI_API_KEYS=gemini-api-keys:latest,STRIPE_SECRET_KEY=stripe-secret-key:latest,STRIPE_WEBHOOK_SECRET=stripe-webhook-secret:latest

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$BUILD_ID
